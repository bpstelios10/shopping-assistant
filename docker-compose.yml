services:
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION}
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:${OLLAMA_VERSION}
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama:/root/.ollama
    entrypoint: >
      sh -c "
      export OLLAMA_HOST=http://ollama:11434;
      until ollama list >/dev/null 2>&1; do
        echo 'Waiting for Ollama...';
        sleep 2;
      done;
      ollama list | grep -q qwen3 || ollama pull qwen3:8b;
      ollama list | grep -q nomic-embed-text || ollama pull nomic-embed-text
      "

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopping_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-shopping_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopping_assistant}
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shopping_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis:/var/lib/redis/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ollama:
  postgres:
  redis:
