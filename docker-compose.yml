services:
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION}
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:${OLLAMA_VERSION}
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama:/root/.ollama
    entrypoint: >
      sh -c "
      export OLLAMA_HOST=http://ollama:11434;
      until ollama list >/dev/null 2>&1; do
        echo 'Waiting for Ollama...';
        sleep 2;
      done;
      ollama list | grep -q qwen3 || ollama pull qwen3:8b
      "

volumes:
  ollama:
