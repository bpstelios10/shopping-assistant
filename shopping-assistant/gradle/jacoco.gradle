def excludedFromJacoco = [
        "**/ShoppingAssistantApplication.class",
        "**/dtos/**",
        "**/config/**",
        "org/learnings/ai/shoppingassistant/rag/loaddocs/**",
]

jacocoTestReport {
    reports {
        xml.required = true
        html.required = true
    }

    afterEvaluate {
        classDirectories.setFrom(files(sourceSets.main.output.classesDirs.collect {
            fileTree(dir: it, exclude: excludedFromJacoco)
        }))
    }
}

jacocoTestCoverageVerification {
    dependsOn jacocoTestReport

    afterEvaluate {
        classDirectories.setFrom(files(sourceSets.main.output.classesDirs.collect {
            fileTree(dir: it, exclude: excludedFromJacoco)
        }))
    }

    violationRules {
        rule {

            element = 'BUNDLE'
            limit {
                counter = 'INSTRUCTION' // bytecode precision
                minimum = 0.96
            }
            limit {
                counter = 'LINE' // most straight-forward to see
                minimum = 0.96
            }
            limit {
                counter = 'BRANCH' // is the hardest to 'cheat'
                minimum = 0.96
            }
            limit {
                counter = 'COMPLEXITY' // complex paths hits
                minimum = 0.96
            }
        }
    }
}

check.dependsOn jacocoTestCoverageVerification
