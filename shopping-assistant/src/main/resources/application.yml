management:
  server:
    port: 8081
  endpoints:
    web:
      base-path: /shopping-assistant/private
      exposure:
        include: prometheus,configprops,env,health,heapdump
      path-mapping:
        prometheus: metrics
  endpoint:
    health:
      probes:
        enabled: true
    heapdump:
      enabled: true

server:
  servlet:
    context-path: /shopping-assistant
  tomcat:
    accept-count: 120
    mbeanregistry:
      enabled: true
    threads:
      max: 500

spring:
  application:
    name: shopping-assistant
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:shopping_assistant}
    username: ${POSTGRES_USER:shopping_assistant}
    password: ${POSTGRES_PASSWORD:shopping_assistant}
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434/v1}
      api-key: ollama # required by the client but not validated by Ollama
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen3:8b}
      # needed for RAG
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    # RAG configuration
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 768 # nomic-embed-text output dimension
    # chat-memory
    chat:
      memory:
        repository:
          redis:
            initialize-schema: true
            time-to-live: 1209600s # 14 days
            key-prefix: "chat:memory:"
            index-name: "chat-memory-index"
  # this is for redis storing chat-memory
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

clients:
  services:
    products:
      base-url: ${PRODUCTS_SERVICE_URL:http://localhost:8082}
      connect-timeout: ${PRODUCTS_CONNECT_TIMEOUT:2s}
      read-timeout: ${PRODUCTS_READ_TIMEOUT:5s}
